# 社区安防门禁系统 - Docker Compose 编排
version: '3.8'

services:
  # 前端服务（物业后台端）
  frontend-admin:
    build:
      context: .
      dockerfile: Dockerfile.frontend-admin
    container_name: security-frontend-admin
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    networks:
      - security-network

  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: security-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///data/security_access.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - AI_SERVICE_URL=http://ai-service:8001
      - PUSH_SERVICE_URL=http://push-service:8002
      - RTMP_SERVER_HOST=${RTMP_SERVER_HOST}
      - RTMP_SERVER_PORT=${RTMP_SERVER_PORT:-1935}
      - GATE_CONTROLLER_HOST=${GATE_CONTROLLER_HOST}
      - GATE_CONTROLLER_PORT=${GATE_CONTROLLER_PORT:-9000}
      - PROPERTY_SERVICE_URL=${PROPERTY_SERVICE_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - db-data:/data
      - face-images:/data/face_images
      - recordings:/data/recordings
      - db-backups:/data/backups
    restart: always
    networks:
      - security-network


volumes:
  db-data:
  face-images:
  recordings:
  db-backups:

networks:
  security-network:
    driver: bridge
